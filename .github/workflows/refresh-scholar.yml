name: Refresh Google Scholar data

on:
  workflow_dispatch:
  schedule:
    - cron: "15 9 * * 1"

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.x"
      - name: Fetch and parse Google Scholar
        run: |
          python3 parse_scholar.py --fetch > scholar_data.json
          python3 -c "from pathlib import Path; data=Path('scholar_data.json').read_text(encoding='utf-8'); Path('data.js').write_text('window.SCHOLAR_DATA = ' + data + ';\n', encoding='utf-8')"
      - name: Commit changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add scholar_data.json data.js
          git diff --cached --quiet || git commit -m "Refresh Google Scholar data"
          git push
